services:
  db:
    image: postgres:18-alpine
    container_name: carcassonne_db
    environment:
      - POSTGRES_PASSWORD=mysecretpassword
    volumes:
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: ./carcassonne/compose.Dockerfile
    container_name: carcassonne_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host # Allows connection to local X server

